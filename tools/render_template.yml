- hosts: localhost
  connection: local
  gather_facts: false
  become: false

# - debug:
#     msg: "{{ ansible_facts }}"
# - debug:
#     msg: "{{ ansible_env }}"
# - debug:
#   msg: >
#     arch: "{{ ansible_architecture }}"
#     os: "{{ ansible_os_family }}"
#     distr: "{{ ansible_distribution }}"
#     release: "{{ ansible_distribution_release }}"
  tasks:
    - name: Load all role defaults recursively
      include_vars:
        dir: "{{ playbook_dir + '/../' + roles_dir + '/' + role_name }}/defaults"
        extensions: ["yml"]
      failed_when: false
    - name: Load Promtail labels
      include_vars:
        dir: "{{ playbook_dir + '/../' + roles_dir }}/promtail/defaults/labels"
        extensions: ["yml"]
      when: role_name in ['grafana','notifications','firewall','rsyslog']
      failed_when: false
    - name: Load SSH defaults
      include_vars:
        dir: "{{ playbook_dir + '/../' + roles_dir }}/sshcli/defaults"
        extensions: ["yml"]
      when: role_name in ['mount_android']
      failed_when: false
    - name: Load Mount Android defaults
      include_vars:
        dir: "{{ playbook_dir + '/..' }}/roles/mount_android/defaults"
        extensions: ["yml"]
      when: role_name in ['scripts']
      failed_when: false
    - name: Render template
      copy:
        content: "{{ lookup('template', playbook_dir + '/../' + template_path) }}"
        dest: "{{ output_path }}"
