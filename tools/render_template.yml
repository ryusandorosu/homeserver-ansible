- hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    # - debug:
    #     msg: "{{ ansible_env }}"
    - name: Load all role defaults recursively
      include_vars:
        dir: "{{ playbook_dir + '/../' + roles_dir + '/' + role_name }}/defaults"
        extensions: ["yml"]
      failed_when: false
    - name: Load Promtail labels
      include_vars:
        dir: "{{ playbook_dir + '/../' + roles_dir }}/promtail/defaults/labels"
        extensions: ["yml"]
      when: role_name in ['grafana','notifications']
      failed_when: false
    - name: Load SSH labels
      include_vars:
        dir: "{{ playbook_dir + '/../' + roles_dir }}/ssh_client/defaults"
        extensions: ["yml"]
      when: role_name in ['mount_android']
      failed_when: false
    - name: Render template
      copy:
        content: "{{ lookup('template', playbook_dir + '/../' + template_path) }}"
        dest: "{{ output_path }}"
