- name: Read profile.yaml
  ansible.windows.slurp:
    path: "{{ ansible_env.USERPROFILE }}\\AppData\\Roaming\\{{ clash_meta_client }}\\profile.yaml"
  register: clash_profile

- name: Extract current id
  set_fact:
    clash_id: "{{ (clash_profile.content | b64decode | from_yaml).current }}"

- name: Read remote rules before deploy
  ansible.windows.slurp:
    path: "{{ ansible_env.USERPROFILE }}\\AppData\\Roaming\\{{ clash_meta_client }}\\rules\\{{ clash_id }}.yaml"
  register: before_rules
  ignore_errors: true

- name: Render rules template
  set_fact:
    rendered_rules: "{{ lookup('template', 'templates/rules.yaml.j2') }}"

