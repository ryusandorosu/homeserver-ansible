- name: Show unified rules diff 
  delegate_to: localhost
  vars:
    before: "{{ before_rules.content | b64decode }}"
    after: "{{ rendered_rules }}"
  shell: |
    python3 - << 'EOF'
    import difflib

    before = """{{ before | replace('"', '\\"') }}""".splitlines()
    after = """{{ after | replace('"', '\\"') }}""".splitlines()

    for line in difflib.unified_diff(before, after, lineterm=''):
        print(line)
    EOF

- name: Deploy clash custom rules
  win_template:
    src: templates/rules.yaml.j2
    dest: "{{ ansible_env.USERPROFILE }}\\AppData\\Roaming\\{{ clash_meta_client }}\\rules\\{{ clash_id }}.yaml"

- name: Read remote config before deploy
  ansible.windows.slurp:
    path: "{{ ansible_env.USERPROFILE }}\\AppData\\Roaming\\{{ clash_meta_client }}\\mihomo.yaml"
  register: before_config
  ignore_errors: true

- name: Render config template
  set_fact:
    rendered_config: "{{ lookup('template', 'templates/mihomo.yaml.j2') }}"

