- hosts: winlinux
  become: true #note that become pass of wsl is required in tasks where it is true (not server's as usual)
  gather_subset:
    - min

  pre_tasks:
    - name: Check OS family
      assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "This playbook supports only Ubuntu"
    - name: Fail if unknown tag is used
      tags: always
      assert:
        that: ansible_run_tags | difference(valid_tags + ['all']) | length == 0
        fail_msg: "Unknown tag used: {{ ansible_run_tags | difference(valid_tags + ['all']) }}"
      vars:
        valid_tags: "{{ roles_list + includes_list }}"

  vars:
    roles_list:
      - packages
      - sshconf
      - vim
      - scripts
    includes_list:
      - zsh

  tasks:
    - name: Include roles dynamically
      include_role:
        name: "{{ role_item }}"
        apply:
          tags: "{{ role_item }}"
      loop: "{{ roles_list }}"
      loop_control:
        loop_var: role_item
      tags:
        - always
    - name: Include server roles
      include_role:
        name: "{{ included_item }}"
        apply:
          tags: "{{ included_item }}"
      loop: "{{ includes_list }}"
      loop_control:
        loop_var: included_item
      tags:
        - always
