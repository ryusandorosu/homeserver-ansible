- hosts: windows

  pre_tasks:
    - name: Check OS family
      assert:
        that: ansible_os_family == "Windows"
        fail_msg: "This playbook supports only Windows"
    - name: Fail if unknown tag is used
      tags: always
      assert:
        that: ansible_run_tags | difference(valid_tags + ['all']) | length == 0
        fail_msg: "Unknown tag used: {{ ansible_run_tags | difference(valid_tags + ['all']) }}"
      vars:
        valid_tags: "{{ roles_list }}"

  vars:
    roles_list:
      - clash_meta

  tasks:
    - name: Include roles dynamically
      include_role:
        name: "{{ role_item }}"
        apply:
          tags: "{{ role_item }}"
      loop: "{{ roles_list }}"
      loop_control:
        loop_var: role_item
      tags:
        - always
