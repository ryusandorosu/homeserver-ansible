- name: Ensure required directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ scripts_dir }}"
    - "{{ custom_logs.services | dirname }}" #/systemd

- name: Deploy scripts
  template:
    src: "{{ item }}"
    dest: "{{ scripts_dir }}/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0755'
  with_fileglob:
    - "templates/scripts/*.j2"
  notify:
    - daemon reload
    - restart services

- name: Deploy systemd services
  template:
    src: "{{ item }}"
    dest: "{{ systemd_services }}/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - "templates/systemd/*.service.j2"
  notify: daemon reload

- name: Enable services
  systemd:
    name: "{{ item | basename | regex_replace('.j2','') | regex_replace('.service','') }}"
    enabled: yes
    state: started
  with_fileglob:
    - "templates/systemd/*.service.j2"
