- name: Load values
  include_vars: "{{ item }}"
  with_fileglob:
    - "{{ inventory_dir }}/../server/promtail/defaults/labels/wireguard.yml"

- name: Ensure scripts directory exists
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ scripts_dir }}"
    - "{{ scripts_dir }}/includes"
    - "{{ custom_logs.wireguard.connect | dirname }}" #/grafana
    - "{{ custom_logs.wireguard.watcher | dirname }}" #/wireguard

- name: Deploy scripts
  template:
    src: "{{ item }}"
    dest: "{{ scripts_dir }}/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0755'
  with_fileglob:
    - "templates/scripts/*.j2"
  notify:
    - daemon reload
    - restart services

- name: Deploy watcher scripts includes
  copy:
    src: "{{ item }}"
    dest: "{{ watcher_scripts_includes }}"
  with_fileglob:
    - "templates/scripts/includes/*.sh"
  notify:
    - daemon reload
    - restart services

- name: Deploy watcher scripts templated includes
  template:
    src: "{{ item }}"
    dest: "{{ watcher_scripts_includes }}/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0755'
  with_fileglob:
    - "templates/scripts/includes/*.j2"
  notify:
    - daemon reload
    - restart services

- name: Deploy systemd services
  template:
    src: "{{ item }}"
    dest: "{{ systemd_services }}/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - "templates/systemd/*.service.j2"
  notify: daemon reload

- name: Enable services
  systemd:
    name: "{{ item | basename | regex_replace('.j2','') | regex_replace('.service','') }}"
    enabled: yes
    state: started
  with_fileglob:
    - "templates/systemd/*.service"
    - "templates/systemd/*.service.j2"
