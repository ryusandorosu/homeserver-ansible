telegram_bot_logs: /var/log/telegram
custom_logs:
  telegram:
    error: "{{ telegram_bot_logs }}/message_error.log"
    success: "{{ telegram_bot_logs }}/message_success.log"
    cache: "{{ telegram_bot_logs }}/geo_cache"
  wireguard: "{{ telegram_bot_logs }}/wireguard/{{ wireguard_interface }}_connections.log"
  container: "{{ telegram_bot_logs }}/systemd/docker_events.log"
  services: "{{ telegram_bot_logs }}/systemd/service_state.log"

promtail_scrape_configs:
  - name: SSH authentication
    path: "{{ sshd_log }}"
  - name: Docker containers
    path: /var/lib/docker/containers/*/*.log
  - name: Services and containers health
    path: "{{ telegram_bot_logs }}/systemd/*.log"
  - name: Wireguard connections
    path: "{{ custom_logs.wireguard }}"
  - name: Telegram notifications
    path: "{{ telegram_bot_logs }}/*.log"
  - name: Fail2Ban
    path: "{{ f2b_log }}"
  - name: CrowdSec
    path: /var/log/crowdsec*.log
  - name: UFW
    path: /var/log/ufw.log
  - name: Samba
    path: /var/log/samba/log.*
  - name: Auditd
    path: /var/log/audit/audit.log
  - name: userlog
    path: /var/log/user.log
  - name: syslog
    path: /var/log/syslog

audit_paths:
  - /etc/ssh/sshd_config
  - /etc/systemd/system
  - /etc/group
  - /etc/shadow
  - /etc/sudoers
  - /etc/passwd
  - /etc/nftables.conf
  - /etc/wireguard/{{ wireguard_interface }}.conf
  - /etc/fail2ban/jail.local
  - /etc/msmtprc
  - /home/{{ user }}/.ssh/authorized_keys
