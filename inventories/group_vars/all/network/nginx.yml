domain: ryusandorosu.ru

nginx_sites:
  - server_name: "{{ domain }}"
    public: true
  - server_name: "www.{{ domain }}"
    public: true
  - server_name: "cockpit.{{ domain }}"
    public: false
    basic_auth: false
    port: "{{ cockpit_port }}"
    proto: https
  - server_name: "grafana.{{ domain }}"
    public: false
    basic_auth: true
    port: "{{ grafana_port }}"
    proto: http
  - server_name: "prometheus.{{ domain }}"
    public: false
    basic_auth: true
    port: "{{ prometheus_port }}"
    proto: http
  - server_name: "wg.{{ domain }}"
    public: false
    basic_auth: false
    port: "{{ wireguard_dashboard_port }}"
    proto: http

letsencrypt_domains: "{{ nginx_sites | map(attribute='server_name') | list }}"

nginx_sni: []

nginx_allowed:
  - "{{ wireguard_network }}"
  - "{{ home_network }}"
  - "{{ home_ip }}"
