f2b_action_labels:
  timestamp:
    bash: (date --iso-8601=seconds)
  jail:
    bash: jail_name
    label: true
  ip:
    bash: banned_ip
    label: true
  hostname:
    bash: (hostname)
    label: true
  bantime:
    bash: BANTIME
  failures:
    bash: failures
  ipfailures:
    bash: ipfailures
  jailfailures:
    bash: ipjailfailures
  logpath:
    bash: logpath
  logtext:
    bash: logtext
  vhost:
    bash: vhost
    label: true
  geoip:
    bash: geojson
    json: true
  country:
    bash: country
    label: true

f2b_action_dashboard:
  uid: fail2ban_actions
  showtime: 24h
