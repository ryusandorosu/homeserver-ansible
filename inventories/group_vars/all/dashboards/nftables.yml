nft_log_prefix: "nft "

nftlog_prefix_labels:
  - chain
  - action

nftlog_selector_labels:
  - DST
  - PROTO
  - MAC
  - DPT
  - MACSRC
  - MACDST
  - MACPROTO

nftlog_line_labels:
  - SRC
  - SPT

nftlog_selector_relabels:
  interface_in:
    regex: IN
    label: iif
  interface_out:
    regex: OUT
    label: oif

nftlog_line_relabels:
  exclude_source_ip:
    regex: SRC
    label: exclude_src
    operator: "!~"
    default:
      - "{{ home_ip }}"
      - "{{ lan_ip.router }}"
      - "{{ lan_ip.wifi }}"
      - 172.17.0.1
      - 172.23.0.1
      - "fe80:0000:0000:0000:da0d:17ff:fedf:d182"
