- name: Install vim
  apt:
    name:
    - vim
    - vim-gtk3
    state: present

- name: Create plugins directory
  file:
    path: "{{ homedir }}/{{ vimplugins }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'

- name: Clone vim plugins
  become_user: "{{ user }}"
  git:
    repo: "{{ item }}"
    dest: "{{ homedir }}/{{ vimplugins }}/{{ item | basename | regex_replace('.git','') }}"
  loop:
    - https://github.com/tpope/vim-fugitive.git
    - https://github.com/airblade/vim-gitgutter.git
    - https://github.com/vim-airline/vim-airline.git

- name: Deploy vimrc
  copy:
    src: .vimrc
    dest: "{{ homedir }}"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0644'

- name: Create root symlink for vimrc
  file:
    src: "{{ homedir }}/.vimrc"
    dest: /root/.vimrc
    state: link

- name: Create root symlink for vim plugins
  file:
    src: "{{ homedir }}/.vim"
    dest: "/root/.vim"
    state: link
