- name: Install zsh
  apt:
    name:
      - zsh
      - bc
      - command-not-found
    state: present
    update_cache: yes

- name: Clone oh-my-zsh
  become_user: "{{ user }}"
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ homedir }}/{{ omz }}"
    version: master
    update: no

- name: Make zsh default shell for root
  become_user: root
  shell: "chsh -s $(which zsh)"

- name: Clone zsh plugins
  become_user: "{{ user }}"
  git:
    repo: "{{ item }}"
    dest: "{{ homedir }}/{{ omz_plug_dir }}/{{ item | basename }}"
  loop:
    - https://github.com/zsh-users/zsh-syntax-highlighting
    - https://github.com/zsh-users/zsh-autosuggestions

- name: Symlink omz for root
  file:
    src: "{{ homedir }}/{{ omz }}"
    dest: "{{ ansible_facts.env.HOME }}/{{ omz }}"
    state: link

- name: Clone personal configs repo
  become_user: "{{ user }}"
  git:
    repo: "{{ zsh_repo_url }}"
    dest: "{{ homedir }}/{{ zsh_repo_dir }}"

- name: Symlink configs repo for root
  file:
    src: "{{ homedir }}/{{ zsh_repo_dir }}"
    dest: "{{ ansible_facts.env.HOME }}/{{ zsh_repo_dir }}"
    state: link

- name: Symlink .zshrc
  become_user: "{{ item | basename }}"
  file:
    src: "{{ item }}/{{ zsh_repo_dir }}/.zshrc"
    dest: "{{ item }}/.zshrc"
    state: link
  loop:
    - "{{ homedir }}"
    - "{{ ansible_facts.env.HOME }}"

- name: Symlink custom theme - passion
  become_user: "{{ item | basename }}"
  file:
    src: "{{ homedir }}/{{ zsh_repo_dir }}/passion.zsh-theme"
    dest: "{{ item }}/{{ omz_themes }}/passion.zsh-theme"
    state: link
  loop:
    - "{{ homedir }}"
    - "{{ ansible_facts.env.HOME }}"

- name: Enable command-not-found for zsh
  command: update-command-not-found
