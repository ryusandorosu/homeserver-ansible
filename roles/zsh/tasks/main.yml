- name: Install zsh
  apt:
    name:
      - zsh
      - bc
      - command-not-found
    state: present
    update_cache: yes

- name: Clone oh-my-zsh
  become_user: "{{ user }}"
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: /home/{{ user }}/.oh-my-zsh
    version: master
    update: no

- name: Clone syntax highlighting
  become_user: "{{ user }}"
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: /home/{{ user }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting

- name: Clone autosuggestions
  become_user: "{{ user }}"
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: /home/{{ user }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions

- name: Symlink omz for root
  file:
    src: "/home/{{ user }}/.oh-my-zsh"
    dest: /root/.oh-my-zsh
    state: link

- name: Clone personal configs repo
  become_user: "{{ user }}"
  git:
    repo: "{{ zsh_repo_url }}"
    dest: "/home/{{ user }}/{{ zsh_repo_dir }}"

- name: Symlink configs repo for root
  file:
    src: "/home/{{ user }}/{{ zsh_repo_dir }}"
    dest: "/root/{{ zsh_repo_dir }}"
    state: link

- name: Symlink .zshrc
  become_user: "{{ item | basename }}"
  file:
    src: "/{{ item }}/{{ zsh_repo_dir }}/.zshrc"
    dest: "/{{ item }}/.zshrc"
    state: link
  loop:
    - home/{{ user }}
    - root

- name: Symlink custom theme - passion
  become_user: "{{ item | basename }}"
  file:
    src: "/home/{{ user }}/{{ zsh_repo_dir }}/passion.zsh-theme"
    dest: "/{{ item }}/.oh-my-zsh/themes/passion.zsh-theme"
    state: link
  loop:
    - home/{{ user }}
    - root

- name: Enable command-not-found for zsh
  command: update-command-not-found
