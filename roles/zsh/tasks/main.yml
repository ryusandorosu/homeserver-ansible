- name: Install zsh
  apt:
    name:
      - zsh
      - bc
    state: present

- name: Clone oh-my-zsh
  become_user: "{{ user }}"
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: /home/{{ user }}/.oh-my-zsh
    version: master
    update: no

- name: Clone syntax highlighting
  become_user: "{{ user }}"
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: /home/{{ user }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting

- name: Clone autosuggestions
  become_user: "{{ user }}"
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: /home/{{ user }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions

- name: Clone personal config
  become_user: "{{ user }}"
  git:
    repo: "{{ zsh_repo_url }}"
    dest: "/home/{{ user }}/{{ zsh_repo_dir }}"

- name: Symlink .zshrc
  become_user: "{{ user }}"
  file:
    src: "/home/{{ user }}/{{ zsh_repo_dir }}/.zshrc"
    dest: "/home/{{ user }}/.zshrc"
    state: link

- name: Symlink custom theme - passion
  become_user: "{{ user }}"
  file:
    src: "/home/{{ user }}/{{ zsh_repo_dir }}/passion.zsh-theme"
    dest: "/home/{{ user }}/.oh-my-zsh/themes/passion.zsh-theme"
    state: link
