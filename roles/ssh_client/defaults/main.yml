ssh_hosts:
  - name: github.com
    hostname: github.com
    user: git
    identity: github

  - name: redmi
    hostname: "{{ wireguard_devices.phone.ip }}"
    port: "{{ termux_port }}"
    user: "{{ termux_user }}"
    identity: "{{ termux_key }}"

  - name: ds209
    hostname: "{{ lan_ip.diskstation }}"
    user: admin
    identity: ds209
    options:
      - PubkeyAcceptedAlgorithms +ssh-rsa
      - HostKeyAlgorithms +ssh-rsa
