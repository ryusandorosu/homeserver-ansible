- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Deploy jail.local
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban

- name: Deploy custom fail2ban actions
  copy:
    src: "{{ item }}"
    dest: "/etc/fail2ban/action.d/"
    owner: root
    group: root
    mode: '0644'
  with_fileglob:
    - "files/action.d/*.conf"
  notify: restart fail2ban

- name: Deploy custom fail2ban filters
  copy:
    src: "{{ item }}"
    dest: "/etc/fail2ban/filter.d/"
    owner: root
    group: root
    mode: '0644'
  with_fileglob:
    - "files/filter.d/*.conf"
  notify: restart fail2ban

- name: Deploy custom fail2ban template actions
  copy:
    src: "{{ item }}"
    dest: "/etc/fail2ban/action.d/{{ item | basename | regex_replace('.j2','') }}"
    owner: root
    group: root
    mode: '0644'
  with_fileglob:
    - "templates/action.d/*.j2"
  notify: restart fail2ban

- name: Deploy custom fail2ban template filters
  copy:
    src: "{{ item }}"
    dest: "/etc/fail2ban/filter.d/{{ item | basename | regex_replace('.j2','') }}"
    owner: root
    group: root
    mode: '0644'
  with_fileglob:
    - "templates/filter.d/*.j2"
  notify: restart fail2ban

- name: Create override dir
  file:
    path: /etc/systemd/system/fail2ban.service.d
    state: directory
    mode: '0755'

- name: Deploy override
  template:
    src: override.conf.j2
    dest: /etc/systemd/system/fail2ban.service.d/override.conf
  notify:
    - daemon reload
    - restart fail2ban

- name: Enable and start fail2ban
  systemd:
    name: fail2ban
    enabled: yes
    state: started
