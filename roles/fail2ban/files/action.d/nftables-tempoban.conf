[INCLUDES]

after = nftables.conf

[Definition]

table_family = inet
table=filter
addr_set=blacklist

actionban = nft add element <table_family> <table> <addr_set> \{ <ip> timeout <bantime> \}
actionunban = nft delete element <table_family> <table> <addr_set> \{ <ip> \}
actioncheck = nft list set <table_family> <table> <addr_set>