- name: Install logrotate
  apt:
    name: logrotate
    state: present
    update_cache: yes

- name: Deploy simple logrotate configs
  copy:
    src: "{{ item }}"
    dest: "/etc/logrotate.d/{{ item | basename }}"
    owner: root
    group: root
    mode: '0644'
  with_fileglob:
    - files/*

- name: Deploy templated logrotate configs
  template:
    src: configured.j2
    dest: "/etc/logrotate.d/{{ item.key }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ logrotate_configs | dict2items }}"
