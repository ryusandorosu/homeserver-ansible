- name: Install base packages
  apt:
    name:
      - git
      - curl
      - jq
      - tree
      - bat
      - far2l
      - tcpdump
      - rsync
      - gcc
      - make
      - ca-certificates
      - unattended-upgrades
      - build-essential
    state: present
    update_cache: yes

- name: Ensure bat config directory exists
  file:
    path: /{{ item }}/.config/bat/
    state: directory
  loop:
    - home/{{ user }}
    - root

- name: Bat settings
  copy:
    content: |
      --style=plain
      --paging=never
    dest: /{{ item }}/.config/bat/config
  loop:
    - home/{{ user }}
    - root
