- name: Import mihomo role default variables
  include_vars:
    file: "{{ role_path }}/../mihomo/defaults/main.yml"
- name: Configure apt proxy
  template:
    src: apt.conf.d/mihomo-proxy.j2
    dest: /etc/apt/apt.conf.d/99-mihomo-proxy
    mode: '0644'

- name: Install base packages
  apt:
    name:
      - git
      - curl
      - jq
      - tree
      - bat
      - tcpdump
      - rsync
      - gcc
      - make
      - ca-certificates
      - unattended-upgrades
      - build-essential
      - bind9-dnsutils
      - btop
      - strace
      - bubblewrap
      - autossh
    state: present
    update_cache: yes

- name: Install Homebrew
  shell: >
    /bin/bash -c "$(
      curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
    )"
  args:
    creates: /home/linuxbrew/.linuxbrew/bin/brew

- name: Add Homebrew to PATH
  shell: >
    eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv zsh)"

- name: Ensure bat config directory exists
  file:
    path: "{{ item }}/.config/bat/"
    state: directory
  loop:
    - "{{ homedir }}"
    - "{{ ansible_facts.env.HOME }}"

- name: Bat settings
  copy:
    content: |
      --style=plain
      --paging=never
    dest: "{{ item }}/.config/bat/config"
  loop:
    - "{{ homedir }}"
    - "{{ ansible_facts.env.HOME }}"

- name: Remove mail from motd
  file:
    path: "/var/mail/{{ user }}"
    state: absent

- name: Print motd to check updates
  copy:
    src: update-motd.d/updates.sh
    dest: /etc/update-motd.d/93-updates
    mode: '0755'

- name: Enable apt unattended-upgrades
  copy:
    src: apt.conf.d/auto-upgrades
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
