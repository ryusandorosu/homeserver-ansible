- name: Ensure cert directory exists
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ubnt_cert_dir }}"
    - "{{ ubnt_pki_dir }}"

- name: Generate Root CA key
  community.crypto.openssl_privatekey:
    path: "{{ ubnt_pki_dir }}/rootCA.key"
    size: 4096
    type: RSA
    mode: '0600'
    return_content: true

- name: Generate Root CA certificate
  community.crypto.x509_certificate:
    path: "{{ ubnt_pki_dir }}/rootCA.crt"
    privatekey_path: "{{ ubnt_pki_dir }}/rootCA.key"
    provider: selfsigned
    selfsigned_not_after: "+3650d"
    return_content: true

- name: Generate private key
  community.crypto.openssl_privatekey:
    path: "{{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.key"
    size: 4096
    type: RSA
    mode: '0600'
    return_content: true

- name: Generate CSR
  community.crypto.openssl_csr:
    path: "{{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.csr"
    privatekey_path: "{{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.key"
    subject:
      countryName: "{{ ubnt_country }}"
      stateOrProvinceName: "{{ ubnt_state }}"
      localityName: "{{ ubnt_locality }}"
      organizationName: "{{ ubnt_org }}"
      commonName: "{{ ubnt_cn }}"
    subject_alt_name: "{{ ubnt_san }}"
    return_content: true

- name: Sign server certificate
  community.crypto.x509_certificate:
    path: "{{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.cert"
    csr_path: "{{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.csr"
    provider: ownca
    ownca_path: "{{ ubnt_pki_dir }}/rootCA.crt"
    ownca_privatekey_path: "{{ ubnt_pki_dir }}/rootCA.key"
    ownca_not_after: "+825d"

- name: Remove CSR
  file:
    path: "{{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.csr"
    state: absent

- name: Generate combined PEM
  shell: |
    cat \
    {{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.key \
    {{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.cert \
    {{ ubnt_pki_dir }}/rootCA.crt \
    | tee {{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.pem
  # args:
  #   creates: "{{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.pem"

- name: Upload PEM to router
  shell: |
    scp -i {{ router_ssh_key }} \
    {{ ubnt_cert_dir }}/{{ ubnt_cert_name }}.pem \
    {{ router_ssh_host }}:{{ ubnt_cert_destination }}

- name: Configure EdgeRouter GUI certificate
  shell: >
    ssh -i {{ router_ssh_key }} {{ router_ssh_host }} '
      source /opt/vyatta/etc/functions/script-template
      configure
      delete service gui cert-file
      set service gui cert-file {{ ubnt_cert_destination }}
      commit
      save
      exit
      sudo service lighttpd restart
    '
