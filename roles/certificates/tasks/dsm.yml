- name: Ensure cert directory exists
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ dsm_cert_dir }}"
    - "{{ dsm_pki_dir }}"

- name: Generate Root CA key
  community.crypto.openssl_privatekey:
    path: "{{ dsm_pki_dir }}/rootCA.key"
    size: 4096
    type: RSA
    mode: '0600'
    return_content: true

- name: Generate Root CA certificate
  community.crypto.x509_certificate:
    path: "{{ dsm_pki_dir }}/rootCA.crt"
    privatekey_path: "{{ dsm_pki_dir }}/rootCA.key"
    provider: selfsigned
    selfsigned_not_after: "+3650d"
    return_content: true

- name: Generate private key
  community.crypto.openssl_privatekey:
    path: "{{ dsm_cert_dir }}/{{ dsm_cert_name }}.key"
    size: 4096
    type: RSA
    mode: '0600'
    return_content: true

- name: Generate CSR
  community.crypto.openssl_csr:
    path: "{{ dsm_cert_dir }}/{{ dsm_cert_name }}.csr"
    privatekey_path: "{{ dsm_cert_dir }}/{{ dsm_cert_name }}.key"
    subject:
      countryName: "{{ dsm_country }}"
      stateOrProvinceName: "{{ dsm_state }}"
      localityName: "{{ dsm_locality }}"
      organizationName: "{{ dsm_org }}"
      commonName: "{{ dsm_cn }}"
    subject_alt_name: "{{ dsm_san }}"
    return_content: true

- name: Sign server certificate
  community.crypto.x509_certificate:
    path: "{{ dsm_cert_dir }}/{{ dsm_cert_name }}.cert"
    csr_path: "{{ dsm_cert_dir }}/{{ dsm_cert_name }}.csr"
    provider: ownca
    ownca_path: "{{ dsm_pki_dir }}/rootCA.crt"
    ownca_privatekey_path: "{{ dsm_pki_dir }}/rootCA.key"
    ownca_not_after: "+825d"

- name: Remove CSR
  file:
    path: "{{ dsm_cert_dir }}/{{ dsm_cert_name }}.csr"
    state: absent
