clash_config_dir: /opt/clash

clash_proxy_mode: rule #rule, global, direct
clash_tunnel_enable: false
clash_dns_enabled: false
clash_subscription_use: true

clash_connection_type: fallback #select, fallback, url-test
clash_connection_interval: 30
clash_connection_tolerance: 100

clash_rules_mode: global
clash_rules:
  global:
    - MATCH,→ Remnawave
  split:
    - "IP-CIDR,{{ wireguard_network }},DIRECT"
    - DOMAIN-SUFFIX,telegram.org,→ Remnawave
    - DOMAIN-SUFFIX,t.me,→ Remnawave
    - IP-CIDR,149.154.160.0/20,→ Remnawave #telegram
    - IP-CIDR,91.108.4.0/22,→ Remnawave #telegram
    - MATCH,DIRECT
