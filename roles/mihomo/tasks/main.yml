- name: Create config dir
  file:
    path: /etc/clash
    state: directory
    mode: '0755'

- name: Get latest mihomo release URL
  shell: >
    curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest
    | grep browser_download_url
    | grep linux-amd64-compatible
    | cut -d '"' -f 4
  register: mihomo_url

- name: Download mihomo
  get_url:
    url: "{{ mihomo_url.stdout }}"
    dest: /tmp/mihomo.gz

- name: Extract mihomo
  command: gunzip -f /tmp/mihomo.gz

- name: Move binary
  command: mv /tmp/mihomo /usr/local/bin/mihomo
  args:
    creates: /usr/local/bin/mihomo

- name: Set executable
  file:
    path: /usr/local/bin/mihomo
    mode: '0755'

- name: Deploy config
  template:
    src: config.yaml.j2
    dest: /etc/clash/config.yaml
  include_vars: proxies.yml
  notify: restart mihomo

- name: Deploy systemd service
  template:
    src: mihomo.service.j2
    dest: /etc/systemd/system/mihomo.service
  notify: daemon reexec

- name: Enable and start mihomo
  systemd:
    name: mihomo
    enabled: yes

- name: Check proxy
  shell: curl --proxy socks5h://127.0.0.1:7891 https://api.ipify.org
  register: proxy_check
  retries: 5
  delay: 5
  until: proxy_check.rc == 0

- name: Check telegram availability
  shell: curl --proxy socks5h://127.0.0.1:7891 https://api.telegram.org
  register: telegram_check
  retries: 5
  delay: 5
  until: telegram_check.rc == 0