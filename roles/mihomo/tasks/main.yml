- name: Create config dir
  file:
    path: "{{ clash_config_dir }}"
    state: directory
    mode: '0755'

- name: Load config values
  include_vars: "{{ item }}"
  with_fileglob:
    - defaults/subscription.yml
    - defaults/config/*.yml

- name: Deploy config
  template:
    src: config.yaml.j2
    dest: "{{ clash_config_dir }}/config.yaml"
  notify:
    - validate config in container

- name: Pull mihomo image
  community.docker.docker_image:
    name: metacubex/mihomo
    tag: latest
    source: pull

- name: Run mihomo container
  community.docker.docker_container:
    name: mihomo
    image: metacubex/mihomo:latest
    restart_policy: unless-stopped
    recreate: true
    restart: true
    ports:
      - "{{ clash_mixed_port }}:{{ clash_mixed_port }}"
      - "{{ socks5_port }}:{{ socks5_port }}"
    volumes:
      - "{{ clash_config_dir }}:/root/.config/mihomo"
    stop_timeout: 30

- import_tasks: healthcheck.yml
