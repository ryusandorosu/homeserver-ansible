- name: Create config dir
  file:
    path: "{{ clash_config_dir }}"
    state: directory
    mode: '0755'

- name: Load config values
  include_vars: "{{ item }}"
  with_fileglob:
    - defaults/subscription.yml
    - defaults/config/*.yml

- name: Deploy config
  template:
    src: config.yaml.j2
    dest: "{{ clash_config_dir }}/config.yaml"
  notify:
    - validate config in container

- name: Pull mihomo image
  community.docker.docker_image:
    name: metacubex/mihomo
    tag: latest
    source: pull

- name: Run mihomo container
  community.docker.docker_container:
    name: mihomo
    image: metacubex/mihomo:latest
    restart_policy: unless-stopped
    recreate: true
    restart: true
    ports:
      - "{{ clash_mixed_port }}:{{ clash_mixed_port }}"
      - "{{ socks5_port }}:{{ socks5_port }}"
    volumes:
      - "{{ clash_config_dir }}:/root/.config/mihomo"
    stop_timeout: 30

- name: Check proxy
  shell: curl --proxy socks5h://{{ localhost }}:{{ socks5_port }} https://api.ipify.org
  register: proxy_check
  retries: 5
  delay: 5
  until: proxy_check.rc == 0

- name: Check Telegram availability
  shell: curl --proxy socks5h://{{ localhost }}:{{ socks5_port }} https://api.telegram.org
  register: telegram_check
  retries: 5
  delay: 5
  until: telegram_check.rc == 0
