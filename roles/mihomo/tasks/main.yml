- name: Create config dir
  file:
    path: "{{ clash_config_dir }}"
    state: directory
    mode: '0755'

- name: Load config values
  include_vars: "{{ item }}"
  with_fileglob:
    - defaults/subscription.yml
    - defaults/config/*.yml

- name: Deploy config
  template:
    src: config.yaml.j2
    dest: "{{ clash_config_dir }}/config.yaml"
  notify:
    - validate config in container

- name: Deploy docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ clash_config_dir }}/docker-compose.yml"

- name: Run Mihomo container
  community.docker.docker_compose_v2:
    project_src: "{{ clash_config_dir }}"
    state: present
    recreate: always

- name: Check proxy
  shell: curl --proxy socks5h://{{ localhost }}:{{ socks5_port }} https://api.ipify.org
  register: proxy_check
  retries: 5
  delay: 5
  until: proxy_check.rc == 0

- name: Check Telegram availability
  shell: curl --proxy socks5h://{{ localhost }}:{{ socks5_port }} https://api.telegram.org
  register: telegram_check
  retries: 5
  delay: 5
  until: telegram_check.rc == 0
