- name: Pull mihomo image
  community.docker.docker_image:
    name: metacubex/mihomo
    tag: latest
    source: pull

- name: Run mihomo container
  community.docker.docker_container:
    name: "{{ docker.mihomo }}"
    image: metacubex/mihomo:latest
    restart_policy: unless-stopped
    recreate: true
    restart: true
    ports:
      - "{{ clash_mixed_port }}:{{ clash_mixed_port }}"
      - "{{ socks5_port }}:{{ socks5_port }}"
    volumes:
      - "{{ clash_config_dir }}:/root/.config/mihomo"
    stop_timeout: 30
