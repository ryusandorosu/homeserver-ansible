- name: Install sshfs
  apt:
    name: sshfs
    state: present

- name: Enable user_allow_other
  lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?user_allow_other'
    line: 'user_allow_other'

- name: Ensure android mount dir exists
  file:
    path: "{{ android_mount_point }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'

- name: Ensure scripts directory exists
  file:
    path: "{{ scripts_dir }}"
    state: directory
    mode: '0755'

- name: Deploy auto mount script
  template:
    src: android-watcher.sh.j2
    dest: "{{ android_watcher_script }}"
  notify: restart watcher service

- name: Deploy auto mount service
  template:
    src: android-watcher.service.j2
    dest: "{{ systemd_services }}/android-watcher.service"
  notify: daemon reload

- name: Enable auto mount service
  systemd:
    name: android-watcher
    enabled: yes
    state: started
