duration: 720h

custom_profiles:
  asname_remedation:
    field: Alert.Source.ASName
    operator: contains
    vars: "{{ blacklist_asn_names }}"
    duration: 2160h

  asnumber_remedation:
    field: Alert.Source.ASNumber
    operator: in
    vars: "{{ blacklist_asn_ids }}"
    duration: 2160h

  country_remedation:
    field: Alert.Source.Country
    operator: in
    vars: "{{ blacklist_countries }}"
    duration: 1440h
