- name: Install rsyslog
  apt:
    name: rsyslog
    state: present
    update_cache: yes

- name: Import promtail role nftables variables
  include_vars:
    file: "{{ role_path }}/../promtail/defaults/labels/nftables.yml"
- name: Deploy configs to log separately from kernel logs
  template:
    src: duplicate.j2
    dest: /etc/rsyslog.d/{{ item.value.priority }}-{{ item.key }}.conf
  loop: "{{ rsyslog_conf | dict2items }}"
  notify: restart rsyslog
# - name: Deploy configs to log separately from kernel logs
#   template:
#     src: exclude.j2
#     dest: /etc/rsyslog.d/{{ item.value.priority }}-{{ item.key }}.conf
#   loop: "{{ rsyslog_conf | dict2items }}"
#   notify: restart rsyslog

- name: Enable remote logging for edgerouter
  template:
    src: remote.conf.j2
    dest: /etc/rsyslog.d/10-remote.conf
  notify: restart rsyslog

- name: Deploy edgerouter config to log separately from kernel logs
  template:
    src: edgerouter.conf.j2
    dest: /etc/rsyslog.d/10-edgerouter.conf
  notify: restart rsyslog
