- name: Install vim
  apt:
    name:
    - vim
    - vim-gtk3
    state: present

- name: Create plugins directory
  file:
    path: /home/{{ user }}/.vim/pack/plugins/start
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'

- name: Clone fugitive plugin
  become_user: "{{ user }}"
  git:
    repo: https://github.com/tpope/vim-fugitive.git
    dest: /home/{{ user }}/.vim/pack/plugins/start/vim-fugitive

- name: Clone gitgutter plugin
  become_user: "{{ user }}"
  git:
    repo: https://github.com/airblade/vim-gitgutter.git
    dest: /home/{{ user }}/.vim/pack/plugins/start/vim-gitgutter

- name: Clone vim airline plugin
  become_user: "{{ user }}"
  git:
    repo: https://github.com/vim-airline/vim-airline.git
    dest: /home/{{ user }}/.vim/pack/plugins/start/vim-airline

- name: Deploy vimrc
  copy:
    src: .vimrc
    dest: "/home/{{ user }}"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0644'
