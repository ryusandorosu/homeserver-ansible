tg_message_labels:
  timestamp:
    bash: "{{ customlog_dateformat }}"
  msg_sent:
    bash: response_ok
    label: true
  response_code:
    bash: response_code
    label: true
  sent_by:
    bash: CALLER
    label: true
  dst_bot:
    bash: TYPE
    label: true
  length:
    bash: (echo -n "${MESSAGE}" | wc -m)
    label: true
  try:
    bash: i
  message:
    bash: MESSAGE
  api_response:
    bash: api_response
    json: true
  curl_response:
    bash: curl_response
    json: true
