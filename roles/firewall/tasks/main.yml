- name: Load values
  include_vars: "{{ item }}"
  with_fileglob:
    - defaults/*.yml

- name: Ensure required network vars defined
  assert:
    that:
      - wireguard_interface is defined
      - wireguard_network is defined
      - wireguard_port is defined
    fail_msg: "Required WireGuard variables are not defined"

- name: Ensure SSH port is allowed in firewall
  assert:
    that: sshd_port in firewall_tcp_ports
    fail_msg: "SSH port is not listed in firewall settings"

- name: Install nftables
  apt:
    name: nftables
    state: present

- name: Create systemd override directory
  file:
    path: "{{ systemd_services }}/nftables.service.d"
    state: directory
    mode: '0755'

- name: Get wireguard service status
  systemd:
    name: wg-quick@{{ wireguard_interface }}
  register: wg_service
  failed_when: false
  changed_when: false

- name: Fail if wireguard service is not enabled
  fail:
    msg: "WireGuard service wg-quick@{{ wireguard_interface }} is not enabled"
  when: wg_service.status.UnitFileState != "enabled"

- name: Deploy nftables override
  template:
    src: override.conf.j2
    dest: "{{ systemd_services }}/nftables.service.d/override.conf"
  notify: daemon reload

- name: Deploy nftables config
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
  notify: reload nftables

- name: Enable and start nftables
  systemd:
    name: nftables
    enabled: yes
    state: started
