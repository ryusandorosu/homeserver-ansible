- name: Ensure scripts directory exists
  file:
    path: "{{ scripts_dir }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - ""
    - "includes"

- name: Deploy scripts
  template:
    src: "{{ item }}"
    dest: "{{ scripts_dir }}/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0755'
  with_fileglob:
    - "templates/scripts/*.j2"
  notify:
    - restart services
    - ensure wireguard logs directory exists
    - ensure geo ip cache directory exists

- name: Deploy watcher scripts includes
  copy:
    src: "{{ item }}"
    dest: "{{ watcher_scripts_includes }}"
  with_fileglob:
    - "templates/scripts/includes/*.sh"
  notify:
    - restart services
    - ensure wireguard logs directory exists
    - ensure geo ip cache directory exists

- name: Deploy watcher scripts templated includes
  template:
    src: "{{ item }}"
    dest: "{{ watcher_scripts_includes }}/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0755'
  with_fileglob:
    - "templates/scripts/includes/*.j2"
  notify:
    - restart services
    - ensure wireguard logs directory exists
    - ensure geo ip cache directory exists

- name: Deploy simple scripts
  template:
    src: "{{ item }}"
    dest: "/usr/local/bin/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0755'
  with_fileglob:
    - "templates/*.j2"
  notify:
    - restart services
    - ensure telegram bot log directory exists

- name: Deploy systemd services
  copy:
    src: "{{ item }}"
    dest: "{{ systemd_services }}"
  with_fileglob:
    - "templates/systemd/*.service"
  notify: daemon reload

- name: Deploy templated systemd services
  template:
    src: "{{ item }}"
    dest: "{{ systemd_services }}/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - "templates/systemd/*.j2"
  notify: daemon reload

- name: Enable services
  systemd:
    name: "{{ item | basename | regex_replace('.j2','') | regex_replace('.service','') }}"
    enabled: yes
    state: started
  with_fileglob:
    - "templates/systemd/*.service"
    - "templates/systemd/*.service.j2"
