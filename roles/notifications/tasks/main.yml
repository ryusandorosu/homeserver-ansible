- name: Copy scripts directory
  copy:
    src: scripts/
    dest: /usr/local/bin/
    mode: '0755'

- name: Deploy watcher scripts
  template:
    src: "{{ item }}"
    dest: "/usr/local/bin/{{ item | regex_replace('.j2','') }}"
    mode: '0755'
  with_fileglob:
    - "templates/*"

- name: Deploy systemd services
  copy:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
  with_fileglob:
    - "files/systemd/*"
  notify: daemon reload

- name: Enable services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - android-watcher
    - ssh-success-watcher
    - vpn-success-watcher
