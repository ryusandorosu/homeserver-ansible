- name: daemon reload
  systemd:
    daemon_reload: yes

- name: restart services
  systemd:
    name: "{{ item | basename | regex_replace('.j2','') | regex_replace('.service','') }}"
    enabled: yes
    state: restarted
  with_fileglob:
    - "templates/systemd/*.service"
    - "templates/systemd/*.service.j2"

- name: ensure custom logs directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ telegram_bot_logs }}"
    - "{{ custom_logs.telegram.cache }}"
    - "{{ custom_logs.wireguard | dirname }}"
    - "{{ custom_logs.container | dirname }}"
    - "{{ custom_logs.services | dirname }}"
  notify: daemon reload
