- name: Download latest far2l appimage archive
  get_url:
    url: https://github.com/spvkgn/far2l-portable/releases/download/latest/far2l-x86_64.AppImage.tar
    dest: /tmp/far2l-x86_64.AppImage.tar
    mode: '0777'

- name: Extract the archive
  unarchive:
    src: /tmp/far2l-x86_64.AppImage.tar
    dest: /tmp/
    remote_src: yes

- name: Install binary
  shell: mv far2l*.AppImage /usr/local/bin/far2l
  args:
    chdir: /tmp/
    creates: /usr/local/bin/far2l

- name: Deploy settings configs
  copy:
    src: "{{ item }}"
    dest: "/home/{{ user }}/.config/far2l/settings/"
    mode: '0644'
  with_fileglob:
    - "files/*.ini"

- name: Enable far2l autosaving settings on exit
  lineinfile:
    path: "/home/{{ user }}/.config/far2l/settings/config.ini"
    regexp: 'AutoSaveSetup=0'
    line: 'AutoSaveSetup=1'

- name: Make far2l use an external editor
  lineinfile:
    path: "/home/{{ user }}/.config/far2l/settings/config.ini"
    regexp: 'UseExternalEditor=0'
    line: 'UseExternalEditor=1'

- name: Make far2l use nvim as the external editor
  lineinfile:
    path: "/home/{{ user }}/.config/far2l/settings/config.ini"
    regexp: '^ExternalEditorName=(.*)$'
    line: 'ExternalEditorName=nvim "!.!"'

#looks ok enabled too on hercules night
- name: Disable far2l palette overriding
  lineinfile:
    path: "/home/{{ user }}/.config/far2l/settings/config.ini"
    regexp: 'TTYPaletteOverride=1'
    line: 'TTYPaletteOverride=0'

- name: Change default theme to Hercules Night
  lineinfile:
    path: "/home/{{ user }}/.config/far2l/settings/colors.ini"
    regexp: 'CurrentTheme=(.*)'
    line: 'CurrentTheme=Hercules Night'
