- name: Install certbot
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Build domain args
  set_fact:
    certbot_domains: "{{ letsencrypt_domains | map('regex_replace', '^(.*)$', '-d \\1') | join(' ') }}"

- name: Obtain certificate
  command: >
    certbot --nginx
    --cert-name {{ domain }}
    {{ certbot_domains }}
    --expand
    --non-interactive
    --agree-tos
    --email {{ vault_mail }}
    --deploy-hook "systemctl reload nginx"
  args:
    creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem