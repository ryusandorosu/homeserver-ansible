- name: Update Node Exporter Full dashboard
  get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: "{{ role_path }}/files/1860_revlatest.json"
    mode: '0755'

#https://grafana.com/grafana/dashboards/17251-wireguard/
#https://grafana.com/grafana/dashboards/22197/ #revision 1: fail2ban
#https://grafana.com/grafana/dashboards/19908-docker-container-monitoring-with-prometheus-and-cadvisor/
#https://grafana.com/grafana/dashboards/24922-retn0-s-smartctl-exporter-dashboard/
#https://grafana.com/grafana/dashboards/18643-synology-snmp/

- name: Deploy Grafana dashboards
  copy:
    src: "{{ item }}"
    dest: "{{ grafana_provisioning_dir }}/dashboards/{{ item | basename }}"
  with_fileglob:
    - "files/*.json"
