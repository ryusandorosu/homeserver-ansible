- name: Load dashboards values
  include_vars: "{{ item }}"
  with_fileglob:
    - defaults/dashboards/*.yml
    - defaults/alerting/*.yml

- name: Create grafana directory
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_user }}"
    mode: "0755"
  loop:
    - "{{ grafana_base_dir }}"
    - "{{ grafana_data_dir }}"
    - "{{ grafana_data_dir }}/plugins"
    - "{{ grafana_provisioning_dir }}/datasources"
    - "{{ grafana_provisioning_dir }}/dashboards"
    - "{{ grafana_provisioning_dir }}/alerting"

- name: Deploy datasource config
  template:
    src: datasources.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/datasources.yml"

- name: Deploy dashboards config
  template:
    src: dashboards.yml.j2
    dest: "{{ grafana_provisioning_dir }}/dashboards/dashboards.yml"

- import_tasks: dashboards.yml
  when: update_grafana_dashboards

- name: Deploy dashboards
  template:
    src: "{{ item }}"
    dest: "{{ grafana_provisioning_dir }}/dashboards/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - "templates/dashboards/*.j2"

- name: Deploy alerts
  template:
    src: "{{ item }}"
    dest: "{{ grafana_provisioning_dir }}/alerting/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - "templates/alerting/*.j2"

- name: Deploy docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ grafana_base_dir }}/docker-compose.yml"

- name: Deploy privoxy config
  template:
    src: privoxy.config.j2
    dest: "{{ grafana_base_dir }}/privoxy.config"

- name: Run Grafana container
  community.docker.docker_compose_v2:
    project_src: "{{ grafana_base_dir }}"
    state: present
    recreate: always

- name: Check Grafana container running status
  uri:
    url: "http://{{ localhost }}:{{ grafana_port }}"
    status_code: 200
  register: result
  retries: 5
  delay: 3
  until: result.status == 200
