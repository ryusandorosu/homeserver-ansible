- name: Create grafana directory
  file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ grafana_base_dir }}"
    - "{{ grafana_provisioning_dir }}/datasources"
    - "{{ grafana_provisioning_dir }}/dashboards"

- name: Deploy datasource config
  template:
    src: datasources.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/datasources.yml"

- name: Deploy dashboards config
  template:
    src: dashboards.yml.j2
    dest: "{{ grafana_provisioning_dir }}/dashboards/dashboards.yml"

- name: Deploy dashboards
  template:
    src: "{{ item }}"
    dest: "{{ grafana_provisioning_dir }}/dashboards/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - "templates/dashboards/*.j2"

- name: Deploy docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ grafana_base_dir }}/docker-compose.yml"

- name: Run Grafana container
  community.docker.docker_compose_v2:
    project_src: "{{ grafana_base_dir }}"
    state: present
