vpn_expr: >-
  job = "{{ promtail_logs.wireguard.name }}", {{ vpn_filters }}, {{ vpn_geoip_filters }}

watcher_dashboard:
  showtime: 7d

vpn_dashboard_panels:
  logs:
    title: Plain Log
    type: logs
    json: true
    expr: '{ {{ vpn_expr }} }'

  geoip:
    title: Connections GeoIP Info
    type: logs
    json: true
    expr: >
      { {{ vpn_expr }} }
      {{ vpn_geoip_json }}
      | line_format "{{ vpn_filters_logformat }}:\n{{ vpn_geoip_logformat }}"
