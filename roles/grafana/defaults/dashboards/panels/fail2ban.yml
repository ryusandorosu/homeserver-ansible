f2b_expr: >-
  job = "{{ promtail_logs.fail2ban_events.name }}",
  {{ f2b_filters | join('", ') + '"' }}

expr_rate: 1m
f2b_dashboard:
  logs:
    title: Latest ban events
    type: logs
    expr: '{ {{ f2b_expr }} }'

  details:
    title: Latest ban events
    type: logs
    expr: '{ {{ f2b_expr }} } | json'

  top_src:
    title: Top banned IPs
    type: timeseries
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            {
              {{ f2b_expr }}
            }
            [{{ expr_rate }}]
          )
        )
      )

  jails:
    title: Ban count by jails
    type: timeseries
    expr: >
      sum by (jail) (
        count_over_time(
          {
            {{ f2b_expr }}
          }
          [{{ expr_rate }}]
        )
      )

  countries:
    title: Ban count by countries
    type: timeseries
    expr: >
      sum by (country) (
        count_over_time(
          {
            {{ f2b_expr }}
          }
          [{{ expr_rate }}]
        )
      )
