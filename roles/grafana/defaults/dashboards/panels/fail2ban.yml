f2b_expr: >-
  job = "{{ promtail_logs.fail2ban_events.name }}",
  {{ f2b_filters | join('", ') + '"' }}

expr_rate: 1m
f2b_dashboard:
  logs:
    title: "Ban events log"
    type: logs
    expr: '{ {{ f2b_expr }} }'

  details:
    title: "Ban events matching logs"
    type: logs
    json: true
    expr: >
      { {{ f2b_expr }} }
      | json
      | line_format "{{ f2b_matchlog_filters | join(' }} ') }} }} \n {% raw %}{{.logtext}}{% endraw %}"

  geoinfo:
    title: "Banned IPs geo info"
    type: logs
    json: true
    expr: >
      { {{ f2b_expr }} }
      | json geoip="geoip"
      | line_format "{% raw %}{{.geoip}}{% endraw %}"

  top_src:
    title: Top banned IPs
    type: barchart
    label: ip
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            { {{ f2b_expr }} }
            [{{ expr_rate }}]
          )
        )
      )

  jails:
    title: Ban count by jails
    type: barchart
    label: jail
    expr: >
      sum by (jail) (
        count_over_time(
          { {{ f2b_expr }} }
          [{{ expr_rate }}]
        )
      )

  countries:
    title: Ban count by countries
    type: barchart
    label: country
    expr: >
      sum by (country) (
        count_over_time(
          { {{ f2b_expr }} }
          [{{ expr_rate }}]
        )
      )

  vhosts:
    title: Bans by vhost
    type: barchart
    label: vhost
    expr: >
      sum by (vhost) (
        count_over_time(
          { {{ f2b_expr }} }
          [{{ expr_rate }}]
        )
      )
