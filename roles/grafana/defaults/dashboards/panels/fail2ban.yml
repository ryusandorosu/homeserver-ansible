f2b_expr: >-
  job = "{{ promtail_logs.fail2ban_actions.name }}", {{ f2b_filters }}

f2b_dashboard:
  logs:
    title: "Ban actions log"
    type: logs
    expr: '{ {{ f2b_expr }} }'

  details:
    title: "Ban actions matching logs"
    type: logs
    json: true
    expr: >
      { {{ f2b_expr }} }
      | json
      | line_format "{{ f2b_matchlog_filters }} \n {% raw %}{{.logtext}}{% endraw %}"

  geoinfo:
    title: "Banned IPs geo info"
    type: logs
    json: true
    expr: >
      { {{ f2b_expr }} }
      | json geoip="geoip"
      | line_format "{% raw %}{{.geoip}}{% endraw %}"

  top_src:
    title: Top banned IPs
    type: timeseries
    label: ip
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            { {{ f2b_expr }} }
            [{{ f2b_action_dashboard.showtime }}]
          )
        )
      )

  jails:
    title: Ban count by jails
    type: timeseries
    label: jail
    expr: >
      sum by (jail) (
        count_over_time(
          { {{ f2b_expr }} }
          [{{ f2b_action_dashboard.showtime }}]
        )
      )

  countries:
    title: Ban count by countries
    type: timeseries
    label: country
    expr: >
      sum by (country) (
        count_over_time(
          { {{ f2b_expr }} }
          [{{ f2b_action_dashboard.showtime }}]
        )
      )

  vhosts:
    title: Bans by vhost
    type: timeseries
    label: vhost
    expr: >
      sum by (vhost) (
        count_over_time(
          { {{ f2b_expr }} }
          [{{ f2b_action_dashboard.showtime }}]
        )
      )
