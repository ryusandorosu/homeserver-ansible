tg_expr: >-
  job = "{{ promtail_logs.telegram.name }}", {{ tg_filters }}

tg_dashboard:
  uid: telegram_messages
  showtime: "{{ showtime.long }}"
  expr_rate: 1m

tg_dashboard_panels:
  logs:
    title: "Messages plain log"
    type: logs
    expr: '{ {{ tg_expr }} }'

  messages:
    title: "Message content"
    type: logs
    json: true
    expr: >
      { {{ tg_expr }} }
      | json
      | line_format "{{ tg_matchlog_filters }} \n {% raw %}{{.message}}{% endraw %}"

  api_responses:
    title: "Telegram API responses"
    type: logs
    json: true
    expr: >
      { {{ tg_expr }} }
      | json api_response="api_response"
      | line_format "{% raw %}{{.api_response}}{% endraw %}"

  # | line_format "{{ tg_matchlog_filters }} \n {% raw %}{{.curl_response}}{% endraw %}"
  curl_responses:
    title: "Curl responses"
    type: logs
    json: true
    expr: >
      { {{ tg_expr }} }
      | json curl_response="curl_response"
      | line_format "{% raw %}{{.curl_response}}{% endraw %}"

  top_src:
    title: Top message senders
    type: timeseries
    label: sent_by
    expr: >
      topk(10,
        sum by (sent_by) (
          count_over_time(
            { {{ tg_expr }} }
            | json sent_by="sent_by"
            [{{ tg_dashboard.showtime }}]
          )
        )
      )

  response_ok:
    title: Message delivery status ratio
    type: timeseries
    label: response_ok
    expr: >
      sum by (response_ok) (
        count_over_time(
          { {{ tg_expr }} }
          [{{ tg_dashboard.showtime }}]
        )
      )

  response_code:
    title: Telegram API error codes
    type: timeseries
    label: response_code
    expr: >
      sum by (response_code) (
        count_over_time(
          { {{ tg_expr }} }
          [{{ tg_dashboard.showtime }}]
        )
      )

  length:
    title: Messages length
    type: timeseries
    label: length
    expr: >
      sum by (length) (
        count_over_time(
          { {{ tg_expr }} }
          | json length="length"
          [{{ tg_dashboard.showtime }}]
        )
      )
