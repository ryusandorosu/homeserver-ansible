nginx_expr: >-
  job = "{{ promtail_logs.nginx_access.name }}",
  {{ nginx_filters | join('", ') + '"' }}

expr_rate: 1m

nginx_dashboard:

  access:
    title: Access logs
    type: logs
    row: common
    expr: '{ {{ nginx_expr }} }'

  error_logs:
    title: Error logs
    type: logs
    row: common
    expr: '{job = "{{ promtail_logs.nginx_error.name }}"}'

  top_hosts:
    title: Most attacked hosts
    type: timeseries
    row: top_stat
    label: vhost
    expr: >
      topk(10,
        sum by (vhost) (
          count_over_time(
            { {{ nginx_expr }} }
            [{{ expr_rate }}]
          )
        )
      )

  top_urls:
    title: Top URLs
    type: timeseries
    row: top_stat
    label:
      - vhost
      - uri
    expr: >
      topk(20,
        sum by (vhost, uri) (
          count_over_time(
            { {{ nginx_expr }} }
            [{{ expr_rate }}]
          )
        )
      )

  top_ips:
    title: Top IPs
    type: barchart
    row: top_stat
    label: ip
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            { {{ nginx_expr }} }
            | regexp "^(?P<ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"
            [{{ expr_rate }}]
          )
        )
      )

  top_countries:
    title: Top countries
    type: barchart
    row: top_stat
    label: geoip_country_name
    expr: >
      sum by (geoip_country_name) (
        count_over_time(
          { {{ nginx_expr }} }
          [{{ expr_rate }}]
        )
      )

  requests:
    title: Total requests
    type: heatmap
    row: common_stat
    expr: >
      sum(
        count_over_time(
          { {{ nginx_expr }} }
          [{{ expr_rate }}]
        )
      )

  rps:
    title: Requests per second
    type: heatmap
    row: common_stat
    expr: >
      sum(
        rate(
          { {{ nginx_expr }} }
          [{{ expr_rate }}]
        )
      )

  4xx_log:
    title: 4xx error logs
    type: logs
    row: error4
    expr: >
      {
        {{ nginx_expr }},
        status =~ "4.."
      }

  5xx_log:
    title: 5xx error logs
    type: logs
    row: error5
    expr: >
      {
        {{ nginx_expr }},
        status =~ "5.."
      }

  4xx_sum:
    title: 4xx errors summary
    type: heatmap
    row: error4
    expr: >
      sum(
        count_over_time(
          {
            {{ nginx_expr }},
            status =~ "4.."
          }
          [{{ expr_rate }}]
        )
      )

  5xx_sum:
    title: 5xx errors summary
    type: heatmap
    row: error5
    expr: >
      sum(
        count_over_time(
          {
            {{ nginx_expr }},
            status =~ "5.."
          }
          [{{ expr_rate }}]
        )
      )

  4xx_rate:
    title: 4xx error rate
    type: heatmap
    row: error4
    expr: >
      sum(
        rate(
          {
            {{ nginx_expr }},
            status =~ "4.."
          }
          [{{ expr_rate }}]
        )
      )

  5xx_rate:
    title: 5xx error rate %
    type: heatmap
    row: error5
    expr: >
      100 * (
        sum(
          rate(
            {
              {{ nginx_expr }},
              status =~ "5.."
            }
            [{{ expr_rate }}]
          )
        ) / sum(
          rate(
            { {{ nginx_expr }} }
            [{{ expr_rate }}]
          )
        )
      )

  latency_p95:
    title: 95 percentile latency
    type: barchart
    row: latency
    expr: >
      quantile_over_time(0.95, 
        { {{ nginx_expr }} }
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ expr_rate }}]
      )

  latency_p99:
    title: 99 percentile latency
    type: barchart
    row: latency
    expr: >
      quantile_over_time(0.99,
        { {{ nginx_expr }} }
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ expr_rate }}]
      )

  latency_avg:
    title: Average latency
    type: barchart
    row: latency
    expr: >
      avg_over_time(
        { {{ nginx_expr }} }
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ expr_rate }}]
      )

nginx_rows:
  common:
    title: Common logs
  top_stat:
    title: Top statistics
  common_stat:
    title: Common statistics
  error4:
    title: 4xx errors
  error5:
    title: 5xx errors
  latency:
    title: Latency
