nginx_expr: >-
  job = "{{ promtail_logs.nginx_access.name }}", {{ nginx_access_filters }}

nginx_dashboard_period:
  showtime: "{{ showtime.normal }}"
  expr_rate: 1m

nginx_http_errors:
  - 4
  - 5

nginx_dashboard:

  access:
    title: Access logs
    type: logs
    row: common
    expr: '{ {{ nginx_expr }} }'

  error_logs:
    title: Error logs
    type: logs
    row: common
    expr: '{ job = "{{ promtail_logs.nginx_error.name }}", {{ nginx_error_filters }} }'

  top_hosts:
    title: Most attacked hosts
    type: timeseries
    row: top_stat
    label: vhost
    expr: >
      topk(10,
        sum by (vhost) (
          count_over_time(
            { {{ nginx_expr }} }
            [{{ nginx_dashboard_period.showtime }}]
          )
        )
      )

  top_urls:
    title: Top URLs
    type: timeseries
    row: top_stat
    label:
      - vhost
      - uri
    expr: >
      topk(20,
        sum by (vhost, uri) (
          count_over_time(
            { {{ nginx_expr }} }
            [{{ nginx_dashboard_period.showtime }}]
          )
        )
      )

  top_ips:
    title: Top IPs
    type: timeseries
    row: top_stat
    label: ip
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            { {{ nginx_expr }} }
            [{{ nginx_dashboard_period.showtime }}]
          )
        )
      )

  top_countries:
    title: Top countries
    type: timeseries
    row: top_stat
    label: geoip_country_name
    expr: >
      sum by (geoip_country_name) (
        count_over_time(
          { {{ nginx_expr }} }
          [{{ nginx_dashboard_period.showtime }}]
        )
      )

  top_agents:
    title: Top agents
    type: timeseries
    row: top_stat
    label: agent
    expr: >
      topk(10,
        sum by (agent) (
          count_over_time(
            { {{ nginx_expr }} }
            [{{ nginx_dashboard_period.showtime }}]
          )
        )
      )

  requests:
    title: Total requests
    type: heatmap
    row: common_stat
    expr: >
      sum(
        count_over_time(
          { {{ nginx_expr }} }
          [{{ nginx_dashboard_period.expr_rate }}]
        )
      )

  rps:
    title: Requests per second
    type: heatmap
    row: common_stat
    expr: >
      sum(
        rate(
          { {{ nginx_expr }} }
          [{{ nginx_dashboard_period.expr_rate }}]
        )
      )

nginx_rows:
  common:
    title: Common logs
  top_stat:
    title: Top statistics
  common_stat:
    title: Common statistics
  error4:
    title: 4xx errors
  error5:
    title: 5xx errors
  latency:
    title: Latency
    panels:
      latency_p95:
        name: 95 percentile
        param: quantile_over_time
        val: "0.95,"
      latency_p99:
        name: 99 percentile
        param: quantile_over_time
        val: "0.99,"
      latency_avg:
        name: Average
        param: avg_over_time
        val: ""

nginx_erlog_panels: |
  {{ lookup('template', '{{ role_path }}/templates/defaults/nginx-erlog.j2') | from_yaml }}

nginx_ersum_panels: |
  {{ lookup('template', '{{ role_path }}/templates/defaults/nginx-ersum.j2') | from_yaml }}

nginx_errate_panels: |
  {{ lookup('template', '{{ role_path }}/templates/defaults/nginx-errate.j2') | from_yaml }}

nginx_latency_panels: |
  {{ lookup('template', '{{ role_path }}/templates/defaults/nginx-latency.j2') | from_yaml }}
