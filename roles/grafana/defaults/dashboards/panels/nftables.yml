nftables_expr: >-
  job = "nftables",
  {{
    nftables_filters
    | join('|^$", ')
    + '"'
  }}
# |^$ - empty label value fallback

nftables_dashboard_period:
  showtime: 6h
  expr_rate: 1m

nftables_dashboard:
  logs:
    title: Firewall logs
    type: logs
    expr: '{ {{ nftables_expr }} }'

  dropped:
    title: Dropped packets
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            {{ nftables_expr }},
            action="drop"
          }
          [{{ nftables_dashboard_period.expr_rate }}]
        )
      )

  allowed:
    title: Allowed packets
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            {{ nftables_expr }},
            action="accept"
          }
          [{{ nftables_dashboard_period.expr_rate }}]
        )
      )

  top_src:
    title: Top source IPs
    type: timeseries
    label: src
    expr: >
      topk(10,
        sum by (src) (
          count_over_time(
            { {{ nftables_expr }} }
            [{{ nftables_dashboard_period.showtime }}]
          )
        )
      )

  top_dst_ports:
    title: Top destination ports
    type: heatmap
    label: dpt
    expr: >
      topk(10,
        sum by (dpt) (
          count_over_time(
            { {{ nftables_expr }} }
            [{{ nftables_dashboard_period.expr_rate }}]
          )
        )
      )

  countries:
    title: Traffic by country
    type: timeseries
    label: geoip_country_name
    expr: >
      sum by (geoip_country_name) (
        count_over_time(
          { {{ nftables_expr }} }
          [{{ nftables_dashboard_period.showtime }}]
        )
      )
