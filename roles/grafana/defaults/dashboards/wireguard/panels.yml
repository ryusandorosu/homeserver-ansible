vpn_expr: >-
  job = "{{ promtail_logs.wireguard.name }}", {{ vpn_filters }}, {{ vpn_geoip_filters }}

watcher_dashboard:
  showtime: 7d
  panel_showtime: 7d

vpn_dashboard_panels:
  logs:
    title: Plain Log
    type: logs
    json: true
    expr: '{ {{ vpn_expr }} }'

vpn_geoip_panels: |
  {{ lookup('template', '{{ role_path }}/templates/defaults/watchers-geoip.j2') | from_yaml }}
