logql_operators:
  equals: '=~'
  not_equals: '!~'

nginx_labels:
  vhost:
    value: equals
  method:
    value: equals
  ip:
    value: not_equals
    default: "{{ home_ip }}"

nginx_filters:
{% for name, cfg in nginx_labels.items() %}
  - '{{ name }} {{ logql_operators[cfg.value] }} "${{ name }}"'
{% endfor %}
