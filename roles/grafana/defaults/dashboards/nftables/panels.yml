nftables_expr: >-
  job = "{{ promtail_logs.nftables.name }}", {{ nftables_filters }}

nftables_dashboard_period:
  showtime: "{{ showtime.long }}"
  expr_rate: "{{ refresh_time.normal }}"

nftables_dashboard:
  logs:
    title: Firewall logs
    type: logs
    expr: '{ {{ nftables_expr }} }'

  dropped:
    title: Dropped packets
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            {{ nftables_expr }},
            action="drop"
          }
          [{{ refresh_time.long }}]
        )
      )

  allowed:
    title: Allowed packets
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            {{ nftables_expr }},
            action="accept"
          }
          [{{ nftables_dashboard_period.expr_rate }}]
        )
      )

  top_src:
    title: Top source IPs
    type: timeseries
    label: saddr
    expr: >
      topk(10,
        sum by (saddr) (
          count_over_time(
            { {{ nftables_expr }} }
            [{{ nftables_dashboard_period.showtime }}]
          )
        )
      )

  top_dst_ports:
    title: Top destination ports
    type: timeseries
    label: dpt
    expr: >
      topk(10,
        sum by (dpt) (
          count_over_time(
            { {{ nftables_expr }} }
            [{{ nftables_dashboard_period.showtime }}]
          )
        )
      )

  countries:
    title: Traffic by country
    type: timeseries
    label: geoip_country_name
    expr: >
      sum by (geoip_country_name) (
        count_over_time(
          { {{ nftables_expr }} }
          [{{ nftables_dashboard_period.showtime }}]
        )
      )
