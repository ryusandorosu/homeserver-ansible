nginx_job: "{{ promtail_logs.nginx_access.name }}"
long_period: 2m
short_period: 10s
nginx_dashboard:

  access:
    title: Access logs
    type: logs
    expr: '{job = "{{ nginx_job }}"}'

  error_logs:
    title: Error logs
    type: logs
    expr: '{job = "{{ promtail_logs.nginx_error.name }}"}'

  5xx_log:
    title: 5xx error logs
    type: logs
    expr: >
      {
        job = "{{ nginx_job }}",
        status =~ "5.."
      }

  4xx_log:
    title: 4xx error logs
    type: logs
    expr: >
      {
        job = "{{ nginx_job }}",
        status =~ "4.."
      }

  top_urls_get:
    title: Top URLs (GET)
    type: heatmap
    expr: >
      topk(10,
        sum by (uri) (
          count_over_time(
            {
              job = "{{ nginx_job }}",
              ip != "{{ home_ip }}",
              method = "GET",
              uri != "",
              uri !~ "^/(api|public|avatar|explore|d|apis)/.*"
            }
            [{{ long_period }}]
          )
        )
      )

  top_urls_post:
    title: Top URLs (POST)
    type: heatmap
    expr: >
      topk(10,
        sum by (uri) (
          count_over_time(
            {
              job = "{{ nginx_job }}",
              ip != "{{ home_ip }}",
              method = "POST",
              uri != "",
              uri !~ "^/(api|public|avatar|explore|d|apis)/.*"
            }
            [{{ long_period }}]
          )
        )
      )

  top_ips_get:
    title: Top IPs (GET)
    type: heatmap
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            {
              job = "{{ nginx_job }}",
              method = "GET"
            }
            | regexp "^(?P<ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"
            [{{ short_period }}]
          )
        )
      )

  top_ips_post:
    title: Top IPs (POST)
    type: heatmap
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            {
              job = "{{ nginx_job }}",
              method = "POST"
            }
            | regexp "^(?P<ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"
            [{{ short_period }}]
          )
        )
      )

  top_countries:
    title: Top countries
    type: timeseries
    expr: >
      sum by (geoip_country_name) (
        count_over_time(
          {job = "{{ nginx_job }}"}
          != "{{ home_ip }}"
          [{{ long_period }}]
        )
      )

  requests:
    title: Total requests
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {job = "{{ nginx_job }}"}
          [{{ long_period }}]
        )
      )

  rps:
    title: Requests per second
    type: heatmap
    expr: >
      sum(
        rate(
          {job = "{{ nginx_job }}"}
          [{{ long_period }}]
        )
      )

  5xx_sum:
    title: 5xx errors summary
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            job = "{{ nginx_job }}",
            status =~ "5.."
          }
          [{{ long_period }}]
        )
      )

  4xx_sum:
    title: 4xx errors summary
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            job = "{{ nginx_job }}",
            status =~ "4.."
          }
          [{{ long_period }}]
        )
      )

  5xx_rate:
    title: 5xx error rate %
    type: heatmap
    expr: >
      100 * (
        sum(
          rate(
            {
              job = "{{ nginx_job }}",
              status =~ "5.."
            }
            [{{ long_period }}]
          )
        )
        /
        sum(
          rate(
            {job = "{{ nginx_job }}"}
            [{{ long_period }}]
          )
        )
      )

  4xx_rate:
    title: 4xx error rate
    type: heatmap
    expr: >
      sum(
        rate(
          {
            job = "{{ nginx_job }}",
            status =~ "4.."
          }
          [{{ long_period }}]
        )
      )

  latency_p95:
    title: 95 percentile latency
    type: heatmap
    expr: >
      quantile_over_time(0.95, 
        {job = "{{ nginx_job }}"}
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ short_period }}]
      )

  latency_p99:
    title: 99 percentile latency
    type: heatmap
    expr: >
      quantile_over_time(0.99,
        {job = "{{ nginx_job }}"}
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ short_period }}]
      )

  latency_avg:
    title: Average latency
    type: heatmap
    expr: >
      avg_over_time(
        {job = "{{ nginx_job }}"}
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ short_period }}]
      )
