nginx_expr: >
  job = "{{ promtail_logs.nginx_access.name }}",
  {{ nginx_filters | join('", ') + '"' }}

long_period: 2m
short_period: 10s

nginx_dashboard:

  access:
    title: Access logs
    type: logs
    expr: '{ {{ nginx_expr }} }'

  error_logs:
    title: Error logs
    type: logs
    expr: '{job = "{{ promtail_logs.nginx_error.name }}"}'

  5xx_log:
    title: 5xx error logs
    type: logs
    expr: >
      {
        {{ nginx_expr }},
        status =~ "5.."
      }

  4xx_log:
    title: 4xx error logs
    type: logs
    expr: >
      {
        {{ nginx_expr }},
        status =~ "4.."
      }

  top_urls:
    title: Top URLs
    type: heatmap
    expr: >
      topk(10,
        sum by (uri) (
          count_over_time(
            {
              {{ nginx_expr }}
            }
            [{{ long_period }}]
          )
        )
      )

  top_ips:
    title: Top IPs
    type: heatmap
    expr: >
      topk(10,
        sum by (ip) (
          count_over_time(
            {
              {{ nginx_expr }}
            }
            | regexp "^(?P<ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"
            [{{ short_period }}]
          )
        )
      )

  top_countries:
    title: Top countries
    type: timeseries
    expr: >
      sum by (geoip_country_name) (
        count_over_time(
          {
            {{ nginx_expr }}
          }
          [{{ long_period }}]
        )
      )

  requests:
    title: Total requests
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            {{ nginx_expr }}
          }
          [{{ long_period }}]
        )
      )

  rps:
    title: Requests per second
    type: heatmap
    expr: >
      sum(
        rate(
          {
            {{ nginx_expr }}
          }
          [{{ long_period }}]
        )
      )

  5xx_sum:
    title: 5xx errors summary
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            {{ nginx_expr }},
            status =~ "5.."
          }
          [{{ long_period }}]
        )
      )

  4xx_sum:
    title: 4xx errors summary
    type: heatmap
    expr: >
      sum(
        count_over_time(
          {
            {{ nginx_expr }},
            status =~ "4.."
          }
          [{{ long_period }}]
        )
      )

  5xx_rate:
    title: 5xx error rate %
    type: heatmap
    expr: >
      100 * (
        sum(
          rate(
            {
              {{ nginx_expr }},
              status =~ "5.."
            }
            [{{ long_period }}]
          )
        ) / sum(
          rate(
            {
              {{ nginx_expr }}
            }
            [{{ long_period }}]
          )
        )
      )

  4xx_rate:
    title: 4xx error rate
    type: heatmap
    expr: >
      sum(
        rate(
          {
            {{ nginx_expr }},
            status =~ "4.."
          }
          [{{ long_period }}]
        )
      )

  latency_p95:
    title: 95 percentile latency
    type: heatmap
    expr: >
      quantile_over_time(0.95, 
        {
          {{ nginx_expr }}
        }
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ short_period }}]
      )

  latency_p99:
    title: 99 percentile latency
    type: heatmap
    expr: >
      quantile_over_time(0.99,
        {
          {{ nginx_expr }}
        }
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ short_period }}]
      )

  latency_avg:
    title: Average latency
    type: heatmap
    expr: >
      avg_over_time(
        {
          {{ nginx_expr }}
        }
        | regexp " (?P<request_time>[0-9.]+)$"
        | unwrap request_time
        [{{ short_period }}]
      )
