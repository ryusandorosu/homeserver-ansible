f2b_labels: >-
  {{
    f2b_action_labels
    | dict2items
    | selectattr('value.label', 'defined')
    | map(attribute='key')
    | list
  }}

f2b_filters: >-
  {% for filter in f2b_labels | reject('equalto', 'vhost') %}{{ filter }} =~ "${{ filter }}", {% endfor %}
  {% for filter in f2b_labels | select('equalto', 'vhost') %}{{ filter }} =~ ".*${{ filter }}.*"{% endfor %}

f2b_matchlog_filters: >-
  {% for filter in f2b_labels %}{{ filter }}={% raw %}{{ {% endraw %}.{{ filter }}{% raw %} }}{% endraw %} {% endfor %}
