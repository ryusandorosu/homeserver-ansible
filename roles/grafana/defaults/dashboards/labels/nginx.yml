nginx_labels:
  vhost:
    operator: '=~'
  method:
    operator: '=~'
  status:
    operator: '=~'
  ip:
    operator: '=~'
  exclude_ip:
    operator: '!~'
    default: "{{ home_ip }}"

nginx_filters: >-
  {{
    nginx_labels
      | dict2items
      | map(attribute='key')
      | zip(
          nginx_labels
          | dict2items
          | map(attribute='value.operator')
        )
      | map('join', ' ')
      | zip(
          nginx_labels
          | dict2items
          | map(attribute='key')
        )
      | map('join', ' "$')
      | list
  }}
