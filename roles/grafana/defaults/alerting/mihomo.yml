interval: 1m
seek_period: 10m
pending_period: 1m

mihomo_alert:
  proxy_healthcheck_fails:
    title: Mihomo proxy health degradation
    description: Too many failed health checks
    severity: warning
    datasource: loki
    query:
      match: "alive: false"
      type: count
      mode: exact
    condition:
      operator: ">"
      value: 5
  proxy_dead_nodes:
    title: Mihomo proxy nodes unavailable
    description: No alive nodes
    severity: error
    datasource: loki
    query:
      match: "alive: true"
      type: count
      mode: exact
    condition:
      operator: "=="
      value: 0
  proxy_healthcheck_latency:
    title: Mihomo proxy increased latency
    description: Long duration of healthchecks (>5000ms)
    severity: warning
    datasource: loki
    query:
      match: "delay: ([5-9][0-9]{3}|[1-9][0-9]{4,}) ms"
      type: count
      mode: regex
    condition:
      operator: ">"
      value: 1
