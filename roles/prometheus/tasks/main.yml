- name: Load values
  include_vars: "{{ item }}"
  with_fileglob:
    - defaults/*.yml

- name: Install smartmontools
  apt:
    name: smartmontools
    state: present

- name: Create prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0755"
  loop:
    - "{{ prometheus_base_dir }}"
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"

- name: Create exporters directories
  file:
    path: "{{ exporters_dir }}"
    state: directory
    mode: "0755"

- name: Deploy prometheus config
  template:
    src: prometheus/prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
  notify: restart prometheus

- name: Deploy prometheus docker-compose
  template:
    src: prometheus/docker-compose.yml.j2
    dest: "{{ prometheus_base_dir }}/docker-compose.yml"
  notify: restart prometheus

- name: Deploy exporters configs and docker-compose
  template:
    src: "{{ item }}"
    dest: "{{ exporters_dir }}/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - templates/exporters/*.j2

- name: Run exporters containers
  community.docker.docker_compose_v2:
    project_src: "{{ exporters_dir }}"
    state: present

- name: Run prometheus container
  community.docker.docker_compose_v2:
    project_src: "{{ prometheus_base_dir }}"
    state: present
