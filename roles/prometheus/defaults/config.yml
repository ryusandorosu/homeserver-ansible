prometheus_scrape_configs:
  node:
    target_src: "{{ docker.metric_exporters.node }}"
    target_port: "{{ node_exporter_port }}"
    labels: instance
  wireguard:
    target_src: "{{ lan_ip.server }}"
    target_port: "{{ wireguard_exporter_port }}"
  fail2ban:
    target_src: "{{ docker.metric_exporters.fail2ban }}"
    target_port: "{{ fail2ban_exporter_port }}"
    labels: instance
  cadvisor:
    target_src: "{{ docker.metric_exporters.cadvisor }}"
    target_port: "{{ cadvisor_port }}"
    labels: instance
  smartctl:
    target_src: "{{ docker.metric_exporters.smartctl }}"
    target_port: "{{ smartctl_exporter_port }}"
    labels: instance

prometheus_scrape_configs_extended:
  snmp:
    path: /snmp
    replacement:
      src: "{{ lan_ip.server }}"
      port: "{{ snmp_exporter_port }}"
    params:
      module: synology
      auth: public_v2
    targets:
      - "{{ lan_ip.diskstation }}"
  blackbox:
    path: /probe
    replacement:
      src: "{{ docker.metric_exporters.blackbox }}"
      port: "{{ blackbox_port }}"
    params:
      module: http_2xx
    targets:
      - https://api.telegram.org
      - https://www.gstatic.com/generate_204
