- name: Add Docker repository
  deb822_repository:
    name: docker
    types: deb
    architectures: "{{ ansible_facts.architecture }}"
    signed_by: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg"
    uris: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}"
    suites: "{{ ansible_facts.distribution_release }}"
    components: stable

- name: Install Docker packages
  apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: yes

- name: Ensure docker service is running
  service:
    name: docker
    state: started
    enabled: true

- name: Run hello-world container
  command: docker run --rm hello-world
  register: docker_test
  changed_when: false

- name: Add user to docker group
  user:
    name: "{{ user }}"
    groups: docker
    append: yes

- name: Deploy service override
  copy:
    src: override.conf
    dest: "{{ systemd_services }}/docker.service.d/override.conf"
  notify: daemon reload
