- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Enable nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

- name: Deploy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: validate and reload nginx

- import_tasks: basic_auth.yml

- name: Deploy nginx sites
  template:
    src: site.j2
    dest: "/etc/nginx/sites-available/{{ item.server_name }}"
  loop: "{{ nginx_sites }}"
  notify: validate and reload nginx

- name: Enable sites
  file:
    src: "/etc/nginx/sites-available/{{ item.server_name }}"
    dest: "/etc/nginx/sites-enabled/{{ item.server_name }}"
    state: link
  loop: "{{ nginx_sites }}"

- name: Replace cockpit motd
  copy:
    content: "Web console: https://{{ 'cockpit.' ~ domain }}"
    dest: "/run/cockpit/active.issue"