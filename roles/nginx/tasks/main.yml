- name: Install nginx
  apt:
    name:
      - nginx
      - libnginx-mod-stream
    state: present
    update_cache: yes

- name: Enable nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

- name: Deploy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: validate and reload nginx

- name: Deploy nginx sites
  template:
    src: site.j2
    dest: "/etc/nginx/sites-available/{{ item.server_name }}"
  loop: "{{ nginx_sites }}"
  notify: validate and reload nginx

- name: Enable sites
  file:
    src: "/etc/nginx/sites-available/{{ item.server_name }}"
    dest: "/etc/nginx/sites-enabled/{{ item.server_name }}"
    state: link
  loop: "{{ nginx_sites }}"

- name: Deploy localhost sites
  template:
    src: "{{ item }}"
    dest: "/etc/nginx/sites-available/{{ item | basename | regex_replace('.j2','') }}"
  with_fileglob:
    - templates/localsites/*.j2
  notify: validate and reload nginx

- name: Enable localhost sites
  file:
    src: "/etc/nginx/sites-available/{{ item | basename | regex_replace('.j2','') }}"
    dest: "/etc/nginx/sites-enabled/{{ item | basename | regex_replace('.j2','') }}"
    state: link
  with_fileglob:
    - templates/localsites/*.j2
