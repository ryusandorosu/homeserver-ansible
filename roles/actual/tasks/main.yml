- name: Create Actual directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ actual_dir }}"
    - "{{ actual_dir }}/data"

- name: Deploy docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ actual_dir }}/docker-compose.yml"

- name: Run containers
  community.docker.docker_compose_v2:
    project_src: "{{ actual_dir }}"
    state: present
    # recreate: always

- name: Wait for Actual to become available
  uri:
    url: "http://{{ localhost }}:{{ actual_port }}"
    status_code: 200
  register: result
  retries: 5
  delay: 3
  until: result.status == 200
