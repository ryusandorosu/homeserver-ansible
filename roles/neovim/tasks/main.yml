- name: Load variables
  include_vars: "{{ item }}"
  with_fileglob:
    - defaults/*.yml

- name: Install required packages
  apt:
    name:
    - npm
    - cargo
    - golang-go
    - cmake
    - ripgrep
    - fd-find
    state: present

- name: Install required packages via npm
  npm:
    name: tree-sitter-cli
    global: true
    state: present

- name: Install neovim from git repo
  get_url:
    url: https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.appimage
    dest: "{{ neovim }}"
    mode: '0777'

- name: Install lazy.nvim plugin package manager
  git:
    repo: https://github.com/folke/lazy.nvim
    dest: "/home/{{ user }}/{{ nvimdir.share }}/lazy/lazy.nvim"

- name: Create config directories for default user
  file:
    path: "/home/{{ user }}/{{ item }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0775'
  loop:
    - "{{ nvimdir.config }}/lua/config"
    - "{{ nvimdir.config }}/lua/plugins"

- name: Ensure required root directories exist
  file:
    path: "/root/{{ item }}"
    state: directory
  loop:
    - "{{ nvimdir.share | dirname }}"

- name: Deploy init.lua
  copy:
    src: templates/init.lua
    dest: "/home/{{ user }}/{{ nvimdir.config }}"
    mode: '0664'

- name: Deploy plugins.lua
  copy:
    src: templates/lua/plugins.lua
    dest: "/home/{{ user }}/{{ nvimdir.config }}/lua"
    mode: '0664'

- name: Deploy plugin configurations for default user
  copy:
    src: "{{ item }}"
    dest: "/home/{{ user }}/{{ nvimdir.config }}/lua/plugins"
    mode: '0664'
  with_fileglob:
    - "templates/lua/plugins/*.lua"

- name: Deploy templated plugin configurations for default user
  template:
    src: "{{ item }}"
    dest: "/home/{{ user }}/{{ nvimdir.config }}/lua/plugins/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0664'
  with_fileglob:
    - "templates/lua/plugins/*.lua.j2"

- name: Deploy lua configs for default user
  copy:
    src: "{{ item }}"
    dest: "/home/{{ user }}/{{ nvimdir.config }}/lua/config"
    mode: '0664'
  with_fileglob:
    - "templates/lua/config/*.lua"

- name: Deploy templated lua configs for default user
  template:
    src: "{{ item }}"
    dest: "/home/{{ user }}/{{ nvimdir.config }}/lua/config/{{ item | basename | regex_replace('.j2','') }}"
    mode: '0664'
  with_fileglob:
    - "templates/lua/config/*.lua.j2"

- name: Synchronize lazy.nvim plugins for default user
  become_user: "{{ user }}"
  command: nvim --headless "+Lazy! sync" +qa
  environment:
    HOME: "/home/{{ user }}"

- name: Install Treesitter parsers for default user
  become_user: "{{ user }}"
  command: nvim --headless "+TSUpdate" +qa
  environment:
    HOME: "/home/{{ user }}"
  # command: nvim --headless "+TSInstall {{ treesitter | join(' ') }}" +qa

- name: Install LSP servers for default user
  become_user: "{{ user }}"
  command: nvim --headless "+MasonInstall {{ mason_install | join(' ') }}" +qa
  environment:
    HOME: "/home/{{ user }}"
  # command: nvim --headless "+MasonInstall {{ mason_lspconfig | map(attribute='mason') | join(' ') }}" +qa
    # command: nvim --headless "+MasonInstall {{ item }}" +qa
    # loop: "{{ mason_lspconfig | map(attribute='mason') }}"

- name: Create root nvim configs symlink
  file:
    src: "/home/{{ user }}/{{ nvimdir.config }}"
    dest: "/root/{{ nvimdir.config }}"
    state: link

- name: Create root nvim shares symlink
  file:
    src: "/home/{{ user }}/{{ nvimdir.share }}"
    dest: "/root/{{ nvimdir.share }}"
    state: link

- name: Set nvim as default sudoeditor
  become_user: root
  command: update-alternatives --install /usr/bin/sudoedit sudoedit {{ neovim }} 50
