# :Mason {{ item }} i
# https://github.com/neovim/nvim-lspconfig/blob/master/doc/configs.md

mason_lspconfig:
  - mason: bash-language-server
    config: bashls
  - mason: yaml-language-server
    config: yamlls
  - mason: ansible-language-server
    config: ansiblels
  - mason: jq-lsp
    config: jqls
    #requires: golang-go
  - mason: json-lsp
    config: jsonls
  - mason: sqlls
    config: sqlls
  - mason: vim-language-server
    config: vimls
  - mason: awk-language-server
    config: awk_ls
  - mason: nginx-language-server
    config: nginx_language_server
  - mason: perlnavigator
    config: perlnavigator
  - mason: python-lsp-server
    config: pylsp
  - mason: systemd-lsp
    config: systemd_lsp
  - mason: jinja-lsp
    config: jinja_lsp
    #requires: cargo
  - mason: dockerfile-language-server
    config: dockerls
  - mason: docker-language-server
    config: docker_language_server

mason_install:
  - yamllint
  - systemdlint
  - bash-debug-adapter
  - go-debug-adapter
  - ansible-lint
  - jq
  - nginx-config-formatter
  - luacheck

# too long compilation, better to install manually via :MasonInstall
mason_manual:
  - golangci-lint
  - luaformatter #requires: cmake
