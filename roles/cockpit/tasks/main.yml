- name: Install Cockpit
  apt:
    name: cockpit
    state: present
    update_cache: yes

- name: Create override dir
  file:
    path: "{{ systemd_services }}/cockpit.socket.d"
    state: directory
    mode: '0755'

- name: Deploy override
  template:
    src: override.conf.j2
    dest: "{{ systemd_services }}/cockpit.socket.d/override.conf"
  notify:
    - daemon reload
    - restart cockpit socket

- name: Enable cockpit
  systemd:
    name: cockpit
    enabled: yes
    state: started

- name: Remove cockpit motd
  file:
    path: /etc/issue.d/cockpit.issue
    state: absent
