- name: Install Cockpit
  apt:
    name: cockpit
    state: present
    update_cache: yes

- name: Create override dirs
  file:
    path: "{{ systemd_services }}/cockpit.socket.d"
    state: directory
    mode: '0755'

- name: Deploy socket override
  template:
    src: override.conf.j2
    dest: "{{ systemd_services }}/cockpit.socket.d/override.conf"
  notify:
    - daemon reload
    - restart cockpit socket

# - name: Deploy socket replacement
#   template:
#     src: cockpit.socket.j2
#     dest: /usr/lib/systemd/system/cockpit.socket
#   notify:
#     - daemon reload
#     - restart cockpit socket

- name: Enable cockpit
  systemd:
    name: cockpit
    enabled: yes
    state: started

- name: Disable cockpit issue
  systemd:
    name: cockpit-issue
    enabled: no
    state: stopped
  failed_when: false

- name: Remove cockpit motd and its creating services
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/issue.d/cockpit.issue
    - /run/cockpit/issue
    - /run/cockpit/active.issue
    - /run/cockpit/inactive.issue
    - /usr/lib/systemd/system/cockpit-issue.service
    - /usr/share/cockpit/issue/inactive.issue
    - /usr/lib/tmpfiles.d/cockpit-ws.conf
    # - /usr/share/cockpit/issue/update-issue #final boss
