- name: Allow to run local scripts
  ansible.windows.win_powershell:
    script: Set-ExecutionPolicy RemoteSigned
  when: powershell_initial_setup

- name: Detect host profile
  set_fact:
    win_host_profile: >-
      {{
        whost
        | dict2items
        | selectattr('value.name', 'equalto', ansible_facts.env.COMPUTERNAME)
        | map(attribute='key')
        | first
      }}

- name: Add environment variables
  ansible.windows.win_powershell:
    script: |
      $PATH = [System.Environment]::GetEnvironmentVariables().PATH
      if ($PATH | Select-String -Pattern "{{ item }}" -SimpleMatch) {
        $Ansible.Changed = $false
      } else {
        [System.Environment]::SetEnvironmentVariable("PATH", "$PATH;{{ item }}", "User")
      }
  loop: "{{ winenvvars.custompaths[win_host_profile] }}"

- name: Refresh environment variables
  win_command: refreshenv

- name: Ensure Chocolatey itself is installed, using community repo for the bootstrap
  win_chocolatey:
    name: chocolatey

- name: Then upgrade Chocolatey because community repo contains an outdated version
  win_command: choco upgrade chocolatey -y

- name: Install Starship
  win_chocolatey:
    name: starship
    state: present

- name: Update NuGet provider
  ansible.windows.win_powershell:
    script: Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force

- name: Update PSReadLine module
  ansible.windows.win_powershell:
    script: Install-Module PSReadLine -Force

- name: Detect Powershell profile dir placement
  win_command: powershell.exe -
  args:
    stdin: Split-Path -Path $PROFILE -Parent
  register: pwsh_dir

- name: Detect Powershell profile
  win_command: powershell.exe -
  args:
    stdin: $PROFILE
  register: pwsh_profile

- name: Ensure PowerShell profile directory exists
  ansible.windows.win_file:
    path: "{{ pwsh_dir.stdout_lines | first }}"
    state: directory

- name: Configure PowerShell profile
  community.windows.win_lineinfile:
    path: "{{ pwsh_profile.stdout_lines | first }}"
    line: '{{ item }}'
    create: true
  loop:
  #Add Starship initialization to PowerShell profile
    - Invoke-Expression (&starship init powershell)
  #Enable PSReadLine predictions, zsh-autosuggestions analogue for powershell
    - Set-PSReadLineOption -PredictionSource History
    - Set-PSReadLineOption -PredictionViewStyle InlineView
