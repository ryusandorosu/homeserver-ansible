winenvvars:
  pathdefaults:
    - C:\WINDOWS\system32 #%SystemRoot%\system32
    - C:\WINDOWS #%SystemRoot%
    - C:\WINDOWS\System32\Wbem #%SystemRoot%\System32\Wbem
    - C:\WINDOWS\System32\WindowsPowerShell\v1.0 #%SYSTEMROOT%\System32\WindowsPowerShell\v1.0\
    - C:\WINDOWS\System32\OpenSSH #%SYSTEMROOT%\System32\OpenSSH\
    - C:\ProgramData\chocolatey\bin
    - C:\Program Files\Microsoft VS Code\bin
    - C:\Program Files\Git\cmd
    - C:\Program Files\WireGuard
    - C:\Program Files\WezTerm
  custompaths:
    asus:
      - C:\Program Files\Eclipse Adoptium\jdk-25.0.2.10-hotspot\bin
      - C:\Program Files\dotnet
      - C:\Users\{{ ansible_facts.env.USERNAME }}\AppData\Local\Microsoft\WindowsApps
      - D:\ytdl_rdgf_script\win
      - C:\Users\{{ ansible_facts.env.USERNAME }}\AppData\Local\Python\bin
      - C:\Users\{{ ansible_facts.env.USERNAME }}\AppData\Roaming\Python\Python314\Scripts
      - C:\Users\{{ ansible_facts.env.USERNAME }}\.local\bin
      - "{{ starship_path }}"
      - C:\Program Files\PowerShell\7
    honor:
      - C:\Users\{{ ansible_facts.env.USERNAME }}\AppData\Local\Programs\Python\Launcher
      - C:\Users\{{ ansible_facts.env.USERNAME }}\AppData\Local\Microsoft\WindowsApps
