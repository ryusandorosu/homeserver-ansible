allowed_countries:
  - Russia

allowed_regions:
  - Tatarstan Republic

allowed_asn:
  - AS12389 PJSC Rostelecom
  - AS16345 PJSC \"Vimpelcom\"

allowed_subnets:
  - "{{ home_network }}"
  - "{{ wireguard_network }}"
  - "{{ home_ip }}/32"

allowed_criteria:
  country:
    bash: allowed_countries
    geoparse: country
  region:
    bash: allowed_regions
    geoparse: region
  asn:
    bash: allowed_asn
    geoparse: ASN
