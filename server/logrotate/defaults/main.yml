logrotate_defaults:
  period: daily
  rotate: 14
  size: 10M
  createmode: "0640"
  createowner: root
  creategroup: adm

logrotate_configs:
  tg-error:
    path: "{{ custom_logs.telegram.error }}"
  nftables:
    path: "{{ rsyslog.nftables }}"
  fail2ban-actions:
    path: "{{ custom_logs.fail2ban }}"
  edgerouter:
    path: "{{ rsyslog.edgerouter }}"
  docker-events:
    path: "{{ custom_logs.container }}"
  service-state:
    path: "{{ custom_logs.services }}"
  vpn-watcher:
    path: "{{ custom_logs.wireguard.watcher }}"
  tg-success:
    path: "{{ custom_logs.telegram.success }}"
    config:
      period: daily
      rotate: 3
      size: 5M
  ansible:
    path: "{{ homedir }}/.ansible/deployment.log"
    config:
      createmode: "0664"
      createowner: "{{ user }}"
      creategroup: "{{ user }}"
