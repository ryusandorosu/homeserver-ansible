inet_filter_sets:
  whitelist:
    type: ipv4_addr
    flags:
      - interval
      - timeout
  blacklist:
    type: ipv4_addr
    flags:
      - interval
      - timeout
  permanent_blacklist:
    type: ipv4_addr
    flags: interval
  asn_blacklist:
    type: ipv4_addr
    flags: interval

firewall_ip_whitelist:
  - "{{ home_ip }}"
