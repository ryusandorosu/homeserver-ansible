mihomo_dashboard_link:
  uid: le_mihomo_dashboard
  panel_id:
    normal: 1
    relative: 2

mihomo_alerts:
  seek_period: "{{ clash_healthcheck_interval // 60 * 2 }}m"
  interval: 1m
  pending_period: 1m

mihomo_metrics:
  proxy_up_nodes:
    draw:
      name: up
      color: semi-dark-green
    query:
      match: "alive: true"
      type: range
      method: count
      mode: exact
    alert:
      title: Mihomo proxy is unavailable
      description: All proxy server nodes do not respond
      severity: error
    condition:
      operator: "=="
      value: 0

  proxy_down_nodes:
    draw:
      name: down
      color: dark-red
    query:
      match: "alive: false"
      type: range
      method: count
      mode: exact
    alert:
      title: Mihomo proxy health degradation
      description: Count of nodes which health checks have been failed
      severity: warning
    condition:
      operator: ">"
      value: 24

  proxy_healthcheck_latency:
    draw:
      name: ">1000ms"
      color: dark-yellow
    query:
      match: "delay: ([1-9][0-9]{3}|[1-9][0-9]{4,}) ms"
      type: range
      method: count
      mode: regex
    alert:
      title: Mihomo proxy increased latency
      description: Count of nodes having long duration of healthchecks (>1000ms)
      severity: warning
    condition:
      operator: ">"
      value: 20
