nginx_labels:
  vhost:
    - access
    - error
  method:
    - access
    - error
  status:
    - access
  ip:
    - access
    - error
  agent:
    - access
  exclude_ip:
    - access
    - error

nginx_exclude_ip:
  - "{{ home_ip }}"
  - "{{ localhost }}"
  - "{{ wireguard_devices.laptop.ip }}"
  # - "{{ lan_ip.large_laptop }}" #:
  - "{{ asus_lan.wireless_tplink }}"
  - "{{ asus_lan.wired_to_tplink }}"
  - "{{ asus_lan.wired_to_router }}"

nginx_access_filters: >-
  {%- for key, value in nginx_labels.items() if key != 'exclude_ip' -%}
  {% if value | select('equalto', 'access') %}
  {{ key }} =~ "${{ key }}", 
  {% endif %}
  {%- endfor -%}
  exclude_ip !~ "$exclude_ip"

nginx_error_filters: >-
  {%- for key, value in nginx_labels.items() if key != 'exclude_ip' -%}
  {% if value | select('equalto', 'error') %}
  {{ key }} =~ "${{ key }}", 
  {% endif %}
  {%- endfor -%}
  exclude_ip !~ "$exclude_ip"
