#rate(wireguard_received_bytes_total[$__rate_interval])
wg_dashboard_panels:
  handshakes:
    title: Latest Handshakes (Seconds)
    type: heatmap
    expr: rate(wireguard_latest_handshake_seconds[$__rate_interval])

  received:
    title: Received Bytes
    type: timeseries
    expr: rate(wireguard_received_bytes_total[$__rate_interval])
    override: decbytes

  sent:
    title: Send Bytes
    type: timeseries
    expr: rate(wireguard_sent_bytes_total[$__rate_interval])
    override: decbytes

  sum_received:
    title: Received bytes summary
    type: timeseries
    expr: sum_over_time(wireguard_received_bytes_total[$__interval])
    override: decbytes

  sum_sent:
    title: Send bytes summary
    type: timeseries
    expr: sum_over_time(wireguard_sent_bytes_total[$__interval])
    override: decbytes
